<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ CPBLdle - 中職猜球員</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="text"] { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center p-4">

    <!-- 返回大廳 -->
    <div class="w-full max-w-md text-left mb-2">
        <a href="../" class="text-sm text-green-400 hover:underline">← 返回遊戲大廳</a>
    </div>

    <!-- Header 標題區 -->
    <header class="text-center mb-4">
        <h1 class="text-3xl font-black tracking-wider text-green-400">⚾ CPBLdle</h1>
        <p class="text-gray-400 text-xs mt-1">猜出今天的神祕中職球員（每日更新）</p>
    </header>

    <!-- 遊戲主要區域 -->
    <main class="w-full max-w-md flex flex-col items-center gap-4">
        
        <!-- 搜尋輸入框與下拉選單 -->
        <div class="w-full relative">
            <input type="text" id="search-input" placeholder="載入資料中，請稍候..." disabled
                   class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-green-500 text-base opacity-50">
            
            <div id="autocomplete-list" class="absolute w-full bg-gray-800 border border-gray-700 rounded-lg mt-1 max-h-48 overflow-y-auto hidden z-50 shadow-2xl"></div>
        </div>

        <!-- 猜測歷史紀錄 -->
<div class="w-full flex flex-col gap-2 mt-2">
            <div class="grid grid-cols-6 gap-1 text-center text-xs font-bold text-gray-500">
                <div>球員</div><div>球隊</div><div>位置</div><div>慣用</div><div>背號</div><div>年齡</div>
            </div>
            
            <div id="grid-container" class="flex flex-col gap-2"></div>
        </div>

        <!-- 遊戲結束彈窗 -->
        <div id="result-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl">
                <h2 id="modal-title" class="text-3xl font-black text-green-400">🎉 任務成功！</h2>
                <p id="modal-desc" class="text-gray-300 mt-2 text-sm"></p>
                <div id="emoji-preview" class="my-4 font-mono text-lg leading-tight bg-gray-900 p-3 rounded-lg border border-gray-700 select-all"></div>
                <button id="share-btn" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-3 rounded-lg transition">
                    📋 複製戰績（分享到 Threads/脆）
                </button>
                <button onclick="closeModal()" class="mt-3 text-xs text-gray-400 hover:underline block mx-auto">關閉視窗</button>
            </div>
        </div>

    </main>

    <script>
        // 全局變數，用來存放非同步載入的球員資料與答案
        let PLAYERS = [];
        let TODAY_ANSWER = null;
        let guessHistory = [];
        let isGameOver = false;

        // 中職位置轉 Dle 英文代號對照表
        const POSITION_MAP = {
            "投手": "P", "捕手": "C", "一壘手": "1B", "二壘手": "2B",
            "三壘手": "3B", "游擊手": "SS", "外野手": "OF", "指定打擊": "DH"
        };

        // DOM 元素
        const searchInput = document.getElementById('search-input');
        const autocompleteList = document.getElementById('autocomplete-list');
        const gridContainer = document.getElementById('grid-container');
        const resultModal = document.getElementById('result-modal');
        const emojiPreview = document.getElementById('emoji-preview');
        const shareBtn = document.getElementById('share-btn');

        // 🚀 初始化：從外部 players.json 讀取資料
        async function initGame() {
            try {
                const response = await fetch('./players.json');
                PLAYERS = await response.json();
                
                // 鎖定每日解答隨機種子
                const todayStr = new Date().toISOString().slice(0, 10);
                let seed = 0;
                for (let i = 0; i < todayStr.length; i++) { seed += todayStr.charCodeAt(i); }
                TODAY_ANSWER = PLAYERS[seed % PLAYERS.length];
                
                console.log("今日答案（測試用）：", TODAY_ANSWER.name);

                // 資料載入完成，解鎖輸入框
                searchInput.disabled = false;
                searchInput.placeholder = "輸入中職球員姓名（例：江坤宇）...";
                searchInput.classList.remove('opacity-50');
                
                setupSearchListener();
            } catch (error) {
                console.error("載入球員資料庫失敗:", error);
                searchInput.placeholder = "❌ 資料庫載入失敗，請重新整理網頁。";
            }
        }

        // 監聽輸入框搜尋
        function setupSearchListener() {
            searchInput.addEventListener('input', function() {
                if (isGameOver) return;
                const query = this.value.trim();
                autocompleteList.innerHTML = '';
                
                if (!query) {
                    autocompleteList.classList.add('hidden');
                    return;
                }

                const filtered = PLAYERS.filter(p => p.name.includes(query));
                
                if (filtered.length > 0) {
                    filtered.forEach(player => {
                        const item = document.createElement('div');
                        item.className = "p-3 cursor-pointer hover:bg-gray-700 border-b border-gray-700 flex justify-between text-sm";
                        item.innerHTML = `<span>${player.name}</span> <span class="text-xs text-gray-400">${player.team}</span>`;
                        
                        item.addEventListener('click', () => {
                            handleGuess(player);
                            searchInput.value = '';
                            autocompleteList.classList.add('hidden');
                        });
                        autocompleteList.appendChild(item);
                    });
                    autocompleteList.classList.remove('hidden');
                } else {
                    autocompleteList.classList.add('hidden');
                }
            });
        }

        // 點擊外面關閉下拉選單
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) autocompleteList.classList.add('hidden');
        });

        // 位置黃色判定邏輯
        function checkPosition(guessPos, answerPos) {
            if (guessPos === answerPos) return { color: "bg-green-600", emoji: "🟩" };
            const infield = ["1B", "2B", "3B", "SS"];
            if (infield.includes(guessPos) && infield.includes(answerPos)) {
                return { color: "bg-yellow-500", emoji: "🟨" };
            }
            return { color: "bg-gray-700", emoji: "⬛" };
        }

        // 處理玩家提交猜測
        function handleGuess(player) {
            if (guessHistory.some(g => g.id === player.id)) return;

            const row = document.createElement('div');
            row.className = "grid grid-cols-6 gap-1 w-full text-center text-sm font-bold h-12";

            // (中間變色判定邏輯保持不變...)
            const teamMatch = player.team === TODAY_ANSWER.team;
            const teamData = { color: teamMatch ? "bg-green-600" : "bg-gray-700", emoji: teamMatch ? "🟩" : "⬛" };
            const posData = checkPosition(player.position, TODAY_ANSWER.position);
            const handMatch = player.main_hand === TODAY_ANSWER.main_hand;
            const handData = { color: handMatch ? "bg-green-600" : "bg-gray-700", emoji: handMatch ? "🟩" : "⬛" };
            const numMatch = player.number === TODAY_ANSWER.number;
            const numArrow = player.number < TODAY_ANSWER.number ? "↑" : (player.number > TODAY_ANSWER.number ? "↓" : "");
            const numData = { color: numMatch ? "bg-green-600" : "bg-yellow-500", emoji: numMatch ? "🟩" : "🟨" };
            const ageMatch = player.age === TODAY_ANSWER.age;
            const ageArrow = player.age < TODAY_ANSWER.age ? "↑" : (player.age > TODAY_ANSWER.age ? "↓" : "");
            const ageData = { color: ageMatch ? "bg-green-600" : "bg-yellow-500", emoji: ageMatch ? "🟩" : "🟨" };

            const currentEmojis = `${teamData.emoji}${posData.emoji}${handData.emoji}${numData.emoji}${ageData.emoji}`;
            guessHistory.push({ id: player.id, emojis: currentEmojis });

            row.innerHTML = `
                <div class="flex items-center justify-center bg-gray-800 rounded text-xs px-0.5 font-medium">${player.name}</div>
                <div class="flex items-center justify-center ${teamData.color} rounded text-xs px-0.5">${player.team.replace("7-ELEVEn", "")}</div>
                <div class="flex items-center justify-center ${posData.color} rounded text-xs">${player.position}</div>
                <div class="flex items-center justify-center ${handData.color} rounded">${player.main_hand}</div>
                <div class="flex items-center justify-center ${numData.color} rounded">${player.number}${numArrow}</div>
                <div class="flex items-center justify-center ${ageData.color} rounded">${player.age}${ageArrow}</div>
            `;

            // ======= 💡 關鍵修改處 1：改用 prepend 插到最前面 =======
            gridContainer.prepend(row); 

            if (player.id === TODAY_ANSWER.id) {
                isGameOver = true;
                showResult(true);
            } else if (guessHistory.length >= 6) {
                isGameOver = true;
                showResult(false);
            }
        }

        // 彈出遊戲結果
        function showResult(isWin) {
            searchInput.disabled = true;
            document.getElementById('modal-title').innerText = isWin ? "🎉 任務成功！" : "💥 挑戰失敗！";
            document.getElementById('modal-title').className = isWin ? "text-3xl font-black text-green-400" : "text-3xl font-black text-red-500";
            document.getElementById('modal-desc').innerText = isWin 
                ? `你花了 ${guessHistory.length} 次猜出：${TODAY_ANSWER.name}！` 
                : `可惜了！今天的正確答案是：${TODAY_ANSWER.name}`;

            const todayStrTW = new Date().toLocaleDateString('zh-TW');
            let emojiText = `📊 CPBLdle 中職猜球員 #${todayStrTW}\n`;
            emojiText += `次數: ${guessHistory.length}/6\n\n`;
            guessHistory.forEach(g => { emojiText += `${g.emojis}\n`; });
            emojiText += `\n點此挑戰 👉 ${window.location.href}`; // 自動抓取當前網址

            emojiPreview.innerText = emojiText.replace(/\n/g, '\r\n');

            shareBtn.onclick = function() {
                navigator.clipboard.writeText(emojiText).then(() => {
                    shareBtn.innerText = "✅ 複製成功！快去發脆吧！";
                    setTimeout(() => { shareBtn.innerText = "📋 複製戰績（分享到 Threads/脆）"; }, 2000);
                }).catch(err => {
                    alert("瀏覽器不支援自動複製，請手動全選方塊區文字進行複製。");
                });
            };

            setTimeout(() => { resultModal.classList.remove('hidden'); }, 800);
        }

        function closeModal() { resultModal.classList.add('hidden'); }

        // 啟動遊戲
        initGame();
    </script>
</body>
</html>
