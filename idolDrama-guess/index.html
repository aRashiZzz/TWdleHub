<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台偶 Dle - 台灣偶像劇猜謎遊戲</title>
    <style>
        :root {
            --color-correct: #66bb6a;
            --color-present: #ffca28;
            --color-absent: #ef5350;
            --color-bg: #f5f6fa;
            --color-card: #ffffff;
            --max-width: 650px;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: var(--max-width);
            position: relative;
        }

        h1 {
            margin: 0;
            color: #e91e63;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            font-size: 2rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        /* 模式切換按鈕區 */
        .mode-toggle-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .mode-btn {
            padding: 6px 16px;
            background-color: #ddd;
            color: #555;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background-color: #e91e63;
            color: white;
            box-shadow: 0 2px 8px rgba(233, 30, 99, 0.3);
        }

        .game-container {
            width: 100%;
            max-width: var(--max-width);
            background: var(--color-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* 提示區塊 */
        .hint-section {
            background: #fff0f5;
            border-left: 5px solid #e91e63;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .hint-title {
            font-weight: bold;
            color: #e91e63;
            margin-bottom: 5px;
        }

        /* 輸入區塊 */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: #e91e63;
        }

        button {
            padding: 12px 24px;
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }

        button:hover {
            background-color: #c2185b;
        }

        /* 下拉自動完成選單 */
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 12px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        /* 歷史猜測表格與響應式欄位比例 */
        .grid-header, .guess-row {
            display: grid;
            grid-template-columns: 2.2fr 1fr 1fr 1.4fr 1fr 1fr;
            gap: 6px;
            width: 100%;
        }

        .grid-header {
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #555;
            padding: 0 2px;
        }

        .guess-row {
            margin-bottom: 6px;
            animation: flipIn 0.5s ease;
        }

        .grid-cell {
            background-color: #eee;
            padding: 12px 2px;
            text-align: center;
            border-radius: 6px;
            font-size: 0.95rem;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            box-sizing: border-box;
            line-height: 1.2;
        }

        .cell-correct { background-color: var(--color-correct); }
        .cell-present { background-color: var(--color-present); }
        .cell-absent { background-color: var(--color-absent); }

        @keyframes flipIn {
            0% { transform: rotateX(-90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        .message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }

        .next-btn {
            margin-top: 15px;
            background-color: #4caf50;
            display: none;
            width: 100%;
        }
        .next-btn:hover {
            background-color: #388e3c;
        }

        /* 手機端與窄螢幕專屬優化 */
        @media (max-width: 500px) {
            body { padding: 10px; }
            .game-container { padding: 15px 10px; }
            .grid-header { font-size: 0.75rem; gap: 4px; }
            .guess-row { gap: 4px; }
            .grid-cell { font-size: 0.72rem; padding: 10px 1px; border-radius: 4px; }
            .grid-cell:nth-child(1) { font-size: 0.7rem; } 
            .grid-cell:nth-child(4) { font-size: 0.68rem; } 
        }
    </style>
</head>
<body>

    <header>
        <h1>🎬 台偶 Dle</h1>
        <div class="subtitle" id="game-subtitle">每天一題，憑線索猜出經典台灣偶像劇！</div>
        
        <div class="mode-toggle-container">
            <button id="mode-daily" class="mode-btn active">每日挑戰</button>
            <button id="mode-endless" class="mode-btn">無限挑戰</button>
        </div>
    </header>

    <div class="game-container">
        <div class="hint-section">
            <div class="hint-title">💡 劇中演員提示 (<span id="hint-count">0</span>)</div>
            <div id="hint-actors">尚未開始猜測，請輸入劇名試試看！</div>
        </div>

        <div class="input-section">
            <input type="text" id="guess-input" placeholder="請輸入劇名（例如：流星花園）..." autocomplete="off">
            <button id="submit-btn">送出</button>
            <div id="suggestions" class="autocomplete-suggestions" style="display: none;"></div>
        </div>

        <div id="results-table" style="display: none;">
            <div class="grid-header">
                <div>劇名</div>
                <div>年份</div>
                <div>首播</div>
                <div>頻道</div>
                <div>集數</div>
                <div>字數</div>
            </div>
            <div id="guess-rows-container"></div>
        </div>

        <div id="game-message" class="message"></div>
        <button id="next-btn" class="next-btn">挑戰下一題 ➔</button>
    </div>

    <script>
        let dramaDatabase = [];
        let todayAnswer = null;
        let guessedCount = 0;
        let gameActive = true;
        let answerActors = []; 
        let gameMode = 'daily'; // 'daily' 或 'endless'

        // 1. 初始化：讀取本地 CSV 檔案
        async function loadCSV() {
            try {
                const response = await fetch('taiwan_idols_database_v3.csv?v=' + new Date().getTime());
                const data = await response.text();
                
                const lines = data.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                
                for(let i = 1; i < lines.length; i++) {
                    const row = parseCSVLine(lines[i]);
                    if(row.length >= 6) {
                        const cleanTitle = row[4].trim();
                        
                        if (cleanTitle.includes('、') || cleanTitle.length > 15 || cleanTitle === "") {
                            continue; 
                        }

                        dramaDatabase.push({
                            year: parseInt(row[0].replace('年','')) || 0, 
                            dateStr: row[1].trim(),                        
                            dateVal: parseDateToNumber(row[1].trim()),     
                            channel: row[2].trim(),
                            episodes: parseInt(row[3]) || 0,
                            title: cleanTitle, 
                            actors: row[5].split(/[、，, ]+/).map(a => a.trim()).filter(a => a)
                        });
                    }
                }

                if(dramaDatabase.length > 0) {
                    initGame();
                    initAutocomplete();
                    setupModeToggle();
                } else {
                    alert("資料庫內無資料，請確認 CSV 檔案格式！");
                }
            } catch (error) {
                console.error("讀取 CSV 錯誤:", error);
                document.getElementById('hint-actors').innerText = "❌ 無法讀取 CSV 檔案，請確保使用本機伺服器開啟本網頁。";
            }
        }

        function parseCSVLine(text) {
            let r = []; let p = ''; let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') { q = !q; } 
                else if (c === ',' && !q) { r.push(p); p = ''; } 
                else { p += c; }
            }
            r.push(p);
            return r;
        }

        function parseDateToNumber(dateStr) {
            const match = dateStr.match(/(\d+)月(\d+)日/);
            if (match) {
                return parseInt(match[1]) * 100 + parseInt(match[2]);
            }
            return 0;
        }

        // 2. 遊戲初始化核心切換邏輯
        function initGame() {
            guessedCount = 0;
            gameActive = true;
            
            // 清空先前的畫面紀錄
            document.getElementById('guess-rows-container').innerHTML = '';
            document.getElementById('results-table').style.display = 'none';
            document.getElementById('game-message').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('guess-input').disabled = false;
            document.getElementById('hint-count').innerText = '0';
            document.getElementById('hint-actors').innerText = '尚未開始猜測，請輸入劇名試試看！';

            if (gameMode === 'daily') {
                document.getElementById('game-subtitle').innerText = "每天一題，憑線索猜出經典台灣偶像劇！";
                const today = new Date();
                const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
                const index = dateSeed % dramaDatabase.length;
                todayAnswer = dramaDatabase[index];
            } else {
                document.getElementById('game-subtitle').innerText = "⚡ 無限挑戰模式：隨機出題，答對後可挑戰下一題！";
                // 無限模式：隨機從資料庫抽一題
                const randomIndex = Math.floor(Math.random() * dramaDatabase.length);
                todayAnswer = dramaDatabase[randomIndex];
            }

            answerActors = [...todayAnswer.actors].sort(() => Math.random() - 0.5);
            console.log(`[${gameMode}模式] 今日答案（調試用）：`, todayAnswer.title);
        }

        // 3. 設定模式切換按鈕事件
        function setupModeToggle() {
            const btnDaily = document.getElementById('mode-daily');
            const btnEndless = document.getElementById('mode-endless');

            btnDaily.addEventListener('click', () => {
                if (gameMode === 'daily') return;
                gameMode = 'daily';
                btnDaily.classList.add('active');
                btnEndless.classList.remove('active');
                initGame();
            });

            btnEndless.addEventListener('click', () => {
                if (gameMode === 'endless') return;
                gameMode = 'endless';
                btnEndless.classList.add('active');
                btnDaily.classList.remove('active');
                initGame();
            });

            // 無限挑戰「下一題」按鈕綁定
            document.getElementById('next-btn').addEventListener('click', initGame);
        }

        // 4. 自動完成選單
        function initAutocomplete() {
            const input = document.getElementById('guess-input');
            const suggBox = document.getElementById('suggestions');

            input.addEventListener('input', () => {
                const val = input.value.trim().toLowerCase();
                suggBox.innerHTML = '';
                if (!val) { suggBox.style.display = 'none'; return; }

                const matches = dramaDatabase.filter(d => d.title.toLowerCase().includes(val)).slice(0, 5);
                
                if(matches.length > 0) {
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = m.title;
                        div.addEventListener('click', () => {
                            input.value = m.title;
                            suggBox.style.display = 'none';
                        });
                        suggBox.appendChild(div);
                    });
                    suggBox.style.display = 'block';
                } else {
                    suggBox.style.display = 'none';
                }
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input) suggBox.style.display = 'none';
            });
        }

        function handleGuess() {
            if (!gameActive) return;
            const input = document.getElementById('guess-input');
            const guessTitle = input.value.trim();
            
            const userGuess = dramaDatabase.find(d => d.title.toLowerCase() === guessTitle.toLowerCase());
            if (!userGuess) {
                alert("找不到這部偶像劇，請選擇下拉選單內有的劇名喔！");
                return;
            }

            guessedCount++;
            input.value = '';
            document.getElementById('results-table').style.display = 'block';

            renderRow(userGuess);
            updateActorHint();

            if (userGuess.title === todayAnswer.title) {
                endGame(true, `🎉 太強了！答案就是《${todayAnswer.title}》！你一共猜了 ${guessedCount} 次。`);
            }
        }

        function renderRow(guess) {
            const container = document.getElementById('guess-rows-container');
            const row = document.createElement('div');
            row.className = 'guess-row';

            let yearArrow = ''; if (guess.year < todayAnswer.year) yearArrow = ' ↑'; if (guess.year > todayAnswer.year) yearArrow = ' ↓';
            let dateArrow = ''; if (guess.dateVal < todayAnswer.dateVal) dateArrow = ' ↑'; if (guess.dateVal > todayAnswer.dateVal) dateArrow = ' ↓';
            let epArrow = ''; if (guess.episodes < todayAnswer.episodes) epArrow = ' ↑'; if (guess.episodes > todayAnswer.episodes) epArrow = ' ↓';
            let lenArrow = ''; if (guess.title.length < todayAnswer.title.length) lenArrow = ' ↑'; if (guess.title.length > todayAnswer.title.length) lenArrow = ' ↓';

            const fields = [
                { val: guess.title, status: guess.title === todayAnswer.title ? 'correct' : 'absent' },
                { val: guess.year + "年" + yearArrow, status: guess.year === todayAnswer.year ? 'correct' : (Math.abs(guess.year - todayAnswer.year) <= 3 ? 'present' : 'absent') },
                { val: guess.dateStr + dateArrow, status: guess.dateVal === todayAnswer.dateVal ? 'correct' : 'absent' },
                { val: guess.channel, status: guess.channel === todayAnswer.channel ? 'correct' : (todayAnswer.channel.includes(guess.channel) || guess.channel.includes(todayAnswer.channel) ? 'present' : 'absent') },
                { val: guess.episodes + "集" + epArrow, status: guess.episodes === todayAnswer.episodes ? 'correct' : (Math.abs(guess.episodes - todayAnswer.episodes) <= 5 ? 'present' : 'absent') },
                { val: guess.title.length + "字" + lenArrow, status: guess.title.length === todayAnswer.title.length ? 'correct' : 'absent' }
            ];

            fields.forEach(f => {
                const cell = document.createElement('div');
                cell.className = `grid-cell cell-${f.status}`;
                cell.innerText = f.val;
                row.appendChild(cell);
            });

            container.insertBefore(row, container.firstChild);
        }

        function updateActorHint() {
            document.getElementById('hint-count').innerText = guessedCount;
            const visibleCount = Math.min(guessedCount, answerActors.length);
            const revealed = answerActors.slice(0, visibleCount);

            if(revealed.length > 0) {
                document.getElementById('hint-actors').innerHTML = `
                    <strong>已解鎖演員：</strong> ${revealed.join(' 、 ')} 
                    ${visibleCount < answerActors.length ? '<br><small style="color:#999">(再猜錯一次會解鎖下一個演員)</small>' : '<br><small style="color:#999">(已解鎖所有主要演員)</small>'}
                `;
            }
        }

        function endGame(win, msg) {
            gameActive = false;
            const msgBox = document.getElementById('game-message');
            msgBox.style.display = 'block';
            msgBox.style.backgroundColor = win ? '#e8f5e9' : '#ffebee';
            msgBox.style.color = win ? '#2e7d32' : '#c62828';
            msgBox.innerText = msg;
            
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('guess-input').disabled = true;

            // 如果是無限挑戰模式，破關後顯示「下一題」按鈕
            if (gameMode === 'endless') {
                document.getElementById('next-btn').style.display = 'block';
            }
        }

        document.getElementById('submit-btn').addEventListener('click', handleGuess);
        document.getElementById('guess-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGuess();
        });

        window.onload = loadCSV;
    </script>
</body>
</html>
